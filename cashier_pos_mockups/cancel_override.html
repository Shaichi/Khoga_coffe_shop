<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Thực Quản Lý - POS Terminal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .phone-container {
            width: 375px;
            height: 100vh;
            max-height: 812px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 24px;
            padding: 24px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .back-btn {
            text-decoration: none;
            color: #8c766c;
            display: flex;
            align-items: center;
        }

        .title {
            color: #2c1a11;
            font-size: 18px;
            font-weight: 700;
            margin: 0;
            flex-grow: 1;
            text-align: center;
            margin-right: 24px;
        }

        .content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 2px;
        }

        .warning-card {
            background: #fff3e0;
            border: 1px solid rgba(255, 152, 0, 0.3);
            border-radius: 12px;
            padding: 12px;
            color: #e65100;
            font-size: 11.5px;
            line-height: 1.4;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #5c3826;
            margin-bottom: 6px;
        }

        .form-select,
        .form-input {
            width: 100%;
            height: 40px;
            background: #fafafa;
            border: 1.5px solid #eaddd3;
            border-radius: 12px;
            padding: 0 14px;
            box-sizing: border-box;
            font-size: 14px;
            color: #2c1a11;
            transition: all 0.2s;
        }

        .form-select:focus,
        .form-input:focus {
            outline: none;
            border-color: #c89d7c;
            background: #fff;
        }

        textarea.form-input {
            height: 54px;
            padding: 8px 14px;
            font-family: inherit;
            resize: none;
        }

        .readonly-value {
            background: #faf8f5;
            border: 1.5px solid #eaddd3;
            border-radius: 12px;
            color: #3d2314;
            padding: 10px 14px;
            font-size: 12px;
            line-height: 1.4;
        }

        .error-message {
            background: #fde8eb;
            border: 1px solid rgba(207, 102, 121, 0.2);
            border-radius: 12px;
            padding: 12px;
            color: #cf6679;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            border: 1px solid rgba(46, 125, 50, 0.2);
            border-radius: 12px;
            padding: 12px;
            color: #2e7d32;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 15px;
            display: none;
        }

        /* Remote Approval Waiting Section */
        .waiting-status-box {
            background: #fdfaf7;
            border: 1.5px solid #eaddd3;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-align: center;
        }

        .waiting-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #eaddd3;
            border-top-color: #c89d7c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .waiting-title {
            font-size: 12px;
            font-weight: 700;
            color: #8c766c;
        }

        .countdown-timer {
            font-size: 13px;
            color: #e65100;
            font-weight: 700;
        }

        .simulator-btn {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid rgba(46, 125, 50, 0.3);
            font-size: 11px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .simulator-btn:hover {
            background: #c8e6c9;
        }

        /* OTP Section directly on screen */
        .otp-section {
            border-top: 1.5px solid #f2ede8;
            padding-top: 12px;
            margin-bottom: 10px;
        }

        .otp-input-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .otp-digit {
            width: 32px;
            height: 38px;
            border: 1.5px solid #eaddd3;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: #2c1a11;
            background: #fafafa;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .numpad-btn {
            height: 34px;
            border-radius: 8px;
            border: 1px solid #eaddd3;
            background: #fdfaf7;
            font-size: 15px;
            font-weight: 600;
            color: #3d2314;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.1s;
        }

        .numpad-btn:active {
            background: #eaddd3;
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            height: 48px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: #cf6679;
            color: white;
        }

        .btn-primary:hover {
            background: #b05161;
        }

        .btn-secondary {
            background: white;
            color: #3d2314;
            border: 1.5px solid #eaddd3;
            box-sizing: border-box;
        }

        .btn-secondary:hover {
            border-color: #c89d7c;
            background: #fdfaf7;
        }

        @media (max-width: 480px) {
            body {
                background-color: white;
            }

            .phone-container {
                width: 100%;
                height: 100vh;
                max-height: none;
                border-radius: 0;
                border: none;
                box-shadow: none;
                padding: 50px 20px 24px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="phone-container">
        <!-- Main Form -->
        <div class="content-area">
            <div class="header">
                <a href="order_history.html" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
                <h1 class="title">Hủy Đơn - Quản Lý</h1>
            </div>

            <div id="errorBox" class="error-message"></div>
            <div id="successBox" class="success-message"></div>

            <!-- BR-07 Notice -->
            <div class="warning-card">
                Cảnh báo: Đơn hàng này đang ở trạng thái pha chế. Nếu xác nhận hủy, nguyên liệu đã sử dụng sẽ tính là
                hao hụt và KHÔNG hoàn lại kho.
            </div>

            <form id="overrideForm" onsubmit="triggerRemoteApproval(event)">
                <!-- Target Order Info read-only -->
                <div class="form-group">
                    <label class="form-label">Thông tin đơn hủy</label>
                    <div class="readonly-value" id="targetOrderText">
                        Đơn hàng: #012 <br>
                        Tổng tiền hoàn trả: 30,000 đ
                    </div>
                </div>

                <!-- Reason Selection -->
                <div class="form-group">
                    <label class="form-label" for="cancelReason">Lý do hủy đơn *</label>
                    <select id="cancelReason" class="form-select" required>
                        <option value="" disabled selected>Chọn lý do...</option>
                        <option value="out_of_ingredient">Hết nguyên liệu pha chế (Out of Milk...)</option>
                        <option value="customer_request">Khách hàng yêu cầu đổi/trả món</option>
                        <option value="wrong_entry">Thu ngân nhập sai thông tin đơn</option>
                        <option value="spilled_order">Hỏng/đổ sản phẩm khi đang chuẩn bị</option>
                    </select>
                </div>

                <!-- Notes Explanation -->
                <div class="form-group">
                    <label class="form-label" for="cancelNotes">Ghi chú chi tiết *</label>
                    <textarea id="cancelNotes" class="form-input" placeholder="Giải trình lý do hủy đơn bắt buộc..."
                        required></textarea>
                </div>
            </form>

            <!-- Remote Waiting Status Box (Displayed after sending request) -->
            <div class="waiting-status-box" id="waitingBox">
                <div class="waiting-header">
                    <div class="spinner"></div>
                    <div class="waiting-title">Đang chờ quản lý duyệt từ xa...</div>
                </div>
                <div class="countdown-timer" id="countdownDisplay">Thời gian còn lại: 60 giây</div>
                <button type="button" class="simulator-btn" onclick="simulateRemoteApproval()">
                    [ Giả Lập ] Quản Lý Duyệt Từ Xa
                </button>
            </div>

            <!-- Offline TOTP Section directly outside -->
            <div class="otp-section">
                <label class="form-label" style="text-align: center;">Mã OTP xác thực của Quản lý (nếu duyệt tại quầy)</label>
                <div class="otp-input-container">
                    <input type="text" class="otp-digit" id="otp_0" readonly maxlength="1">
                    <input type="text" class="otp-digit" id="otp_1" readonly maxlength="1">
                    <input type="text" class="otp-digit" id="otp_2" readonly maxlength="1">
                    <input type="text" class="otp-digit" id="otp_3" readonly maxlength="1">
                    <input type="text" class="otp-digit" id="otp_4" readonly maxlength="1">
                    <input type="text" class="otp-digit" id="otp_5" readonly maxlength="1">
                </div>

                <!-- Onscreen Numpad -->
                <div class="numpad">
                    <button type="button" class="numpad-btn" onclick="pressNumpad(1)">1</button>
                    <button type="button" class="numpad-btn" onclick="pressNumpad(2)">2</button>
                    <button type="button" class="numpad-btn" onclick="pressNumpad(3)">3</button>
                    <button type="button" class="numpad-btn" onclick="pressNumpad(4)">4</button>
                    <button type="button" class="numpad-btn" onclick="pressNumpad(5)">5</button>
                    <button type="button" class="numpad-btn" onclick="pressNumpad(6)">6</button>
                    <button type="button" class="numpad-btn" onclick="pressNumpad(7)">7</button>
                    <button type="button" class="numpad-btn" onclick="pressNumpad(8)">8</button>
                    <button type="button" class="numpad-btn" onclick="pressNumpad(9)">9</button>
                    <button type="button" class="numpad-btn" onclick="pressNumpad('CLR')" style="font-size: 11px; font-weight: bold; background: #feebe8; color: #cf6679;">XÓA</button>
                    <button type="button" class="numpad-btn" onclick="pressNumpad(0)">0</button>
                    <button type="button" class="numpad-btn" onclick="pressNumpad('OK')" style="font-size: 11px; font-weight: bold; background: #e8f5e9; color: #2e7d32;">OK</button>
                </div>
            </div>
        </div>

        <!-- Footer Buttons -->
        <div class="btn-row">
            <a href="order_history.html" class="btn btn-secondary">HỦY BỎ</a>
            <button type="submit" form="overrideForm" class="btn btn-primary" id="btnSubmit">GỬI CHO QUẢN LÝ</button>
        </div>
    </div>

    <script>
        let orderId = "012";
        let orderTotal = 30000;
        let orderStatus = "PREPARING";

        let countdown = 60;
        let timerInterval = null;
        let enteredOtp = [];

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            orderId = urlParams.get('id') || "012";
            orderTotal = parseFloat(urlParams.get('total')) || 30000;
            orderStatus = urlParams.get('status') || "PREPARING";

            document.getElementById('targetOrderText').innerHTML = `
                <strong>Đơn hàng:</strong> #${orderId} (Trạng thái: ${orderStatus === 'PREPARING' ? 'Đang pha chế' : 'Chờ lấy hàng'}) <br>
                <strong>Số tiền hoàn trả:</strong> ${orderTotal.toLocaleString('vi-VN')} VND
            `;
        });

        function triggerRemoteApproval(e) {
            e.preventDefault();
            const reasonSelect = document.getElementById('cancelReason');
            const notes = document.getElementById('cancelNotes').value.trim();

            if (!reasonSelect.value || !notes) {
                alert("Vui lòng nhập lý do và giải trình chi tiết trước khi xác nhận!");
                return;
            }

            // Disable inputs during active request
            reasonSelect.disabled = true;
            document.getElementById('cancelNotes').disabled = true;
            document.getElementById('btnSubmit').disabled = true;
            document.getElementById('btnSubmit').style.opacity = '0.5';

            // Display inline waiting box
            document.getElementById('waitingBox').style.display = 'flex';

            // Start countdown
            countdown = 60;
            document.getElementById('countdownDisplay').textContent = `Thời gian còn lại: ${countdown} giây`;
            document.getElementById('countdownDisplay').style.color = '#e65100';

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                countdown--;
                document.getElementById('countdownDisplay').textContent = `Thời gian còn lại: ${countdown} giây`;
                if (countdown <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('countdownDisplay').textContent = `Yêu cầu đã hết hạn!`;
                    document.getElementById('countdownDisplay').style.color = '#cf6679';
                    
                    // Re-enable
                    reasonSelect.disabled = false;
                    document.getElementById('cancelNotes').disabled = false;
                    document.getElementById('btnSubmit').disabled = false;
                    document.getElementById('btnSubmit').style.opacity = '1';
                }
            }, 1000);
        }

        function pressNumpad(val) {
            if (val === 'CLR') {
                enteredOtp = [];
                updateOtpFields();
            } else if (val === 'OK') {
                verifyOtp();
            } else {
                if (enteredOtp.length < 6) {
                    enteredOtp.push(val);
                    updateOtpFields();
                }
                if (enteredOtp.length === 6) {
                    // Auto-verify when 6 digits are reached
                    verifyOtp();
                }
            }
        }

        function updateOtpFields() {
            for (let i = 0; i < 6; i++) {
                const input = document.getElementById(`otp_${i}`);
                input.value = (enteredOtp[i] !== undefined) ? enteredOtp[i] : "";
            }
        }

        function verifyOtp() {
            const otpCode = enteredOtp.join("");
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');

            if (otpCode.length < 6) {
                alert("Vui lòng nhập đầy đủ mã OTP 6 số!");
                return;
            }

            // Correct simulation OTP is 123456
            if (otpCode === "123456") {
                if (timerInterval) clearInterval(timerInterval);
                document.getElementById('waitingBox').style.display = 'none';

                successBox.innerHTML = `✅ Phê duyệt thành công qua OTP ngoại tuyến! <br><strong>Nhật ký:</strong> Khôi phục Voucher, hoàn trả điểm tích lũy & ghi nhận phí hao hụt nguyên liệu (Theo BR-07 & BR-08).`;
                successBox.style.display = 'block';
                errorBox.style.display = 'none';
                
                // Disable all form inputs
                document.getElementById('cancelReason').disabled = true;
                document.getElementById('cancelNotes').disabled = true;
                document.getElementById('btnSubmit').disabled = true;

                setTimeout(() => {
                    window.location.href = "order_history.html";
                }, 2500);
            } else {
                alert("Mã OTP không chính xác. Thử lại với mã '123456' để chạy giả lập.");
                enteredOtp = [];
                updateOtpFields();
            }
        }

        function simulateRemoteApproval() {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('waitingBox').style.display = 'none';

            const successBox = document.getElementById('successBox');
            const errorBox = document.getElementById('errorBox');

            successBox.innerHTML = `✅ Đã phê duyệt từ xa thành công bởi Quản lý! <br><strong>Nhật ký:</strong> Khôi phục Voucher, hoàn trả điểm tích lũy & ghi nhận phí hao hụt nguyên liệu (Theo BR-07 & BR-08).`;
            successBox.style.display = 'block';
            errorBox.style.display = 'none';

            // Disable all form inputs
            document.getElementById('cancelReason').disabled = true;
            document.getElementById('cancelNotes').disabled = true;
            document.getElementById('btnSubmit').disabled = true;

            setTimeout(() => {
                window.location.href = "order_history.html";
            }, 2500);
        }
    </script>
</body>

</html>
