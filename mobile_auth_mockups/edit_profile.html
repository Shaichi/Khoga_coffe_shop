<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Staff Portal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fcfaf7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .phone-container { width: 375px; height: 100vh; max-height: 812px; background: white; border: 1px solid #eee; border-radius: 24px; padding: 40px 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; }
        h2 { color: #2c1a11; text-align: center; margin-top: 30px; font-size: 24px; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #5c3826; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; height: 48px; padding: 12px; border: 1px solid #e5dbcf; border-radius: 12px; box-sizing: border-box; font-size: 16px; background-color: #fdfdfd; transition: all 0.2s; }
        input:focus { outline: none; border-color: #c89d7c; background-color: #fff; }
        button { width: 100%; height: 50px; background: #3d2314; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        button:hover { background: #5c3826; }
        button:active { background: #2c1a11; }
        .links { text-align: center; margin-top: 20px; }
        a { color: #8c766c; text-decoration: none; font-size: 14px; font-weight: 600; }
        a:hover { color: #5c3826; }
        
        @media (max-width: 480px) {
            body { background-color: white; }
            .phone-container { width: 100%; height: 100vh; max-height: none; border-radius: 0; border: none; box-shadow: none; padding: 60px 24px 40px 24px; }
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div>
            <h2>Chỉnh Sửa Thông Tin</h2>
            <p style="color: #8c766c; font-size: 14px; text-align: center; margin-top: 10px; margin-bottom: 40px; line-height: 1.5;">Cập nhật thông tin liên hệ cá nhân của bạn.</p>

            <div class="form-group">
                <label>Email liên hệ</label>
                <input type="email" id="email" placeholder="example@coffeeshop.com" value="cashier01@espressomail.com">
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="tel" id="phone" placeholder="Số điện thoại" value="0987654321">
            </div>
        </div>

        <div>
            <button onclick="handleSaveProfile()">LƯU THAY ĐỔI</button>
            <div class="links">
                <a href="#" onclick="handleCancel(); return false;">Hủy bỏ</a>
            </div>
        </div>
    </div>

    <script>
        function getParams() {
            return new URLSearchParams(window.location.search).toString();
        }
        window.onload = function() {
            if (localStorage.getItem('staff_email')) {
                document.getElementById('email').value = localStorage.getItem('staff_email');
            }
            if (localStorage.getItem('staff_phone')) {
                document.getElementById('phone').value = localStorage.getItem('staff_phone');
            }
        }
        function handleCancel() {
            window.location.href = "view_profile.html?" + getParams();
        }
        function handleSaveProfile() {
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            
            if (!email.includes('@')) {
                alert("Vui lòng nhập đúng định dạng email.");
                return;
            }
            if (phone.trim() === "") {
                alert("Số điện thoại không được bỏ trống.");
                return;
            }

            localStorage.setItem('staff_email', email);
            localStorage.setItem('staff_phone', phone);
            
            alert("Cập nhật thông tin thành công!");
            window.location.href = "view_profile.html?" + getParams();
        }
    </script>
</body>
</html>
