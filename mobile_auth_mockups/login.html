<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Staff Portal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fcfaf7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .phone-container { width: 375px; height: 100vh; max-height: 812px; background: white; border: 1px solid #eee; border-radius: 24px; padding: 40px 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; }
        h2 { color: #2c1a11; text-align: center; margin-top: 30px; font-size: 26px; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #5c3826; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; height: 48px; padding: 12px; border: 1px solid #e5dbcf; border-radius: 12px; box-sizing: border-box; font-size: 16px; background-color: #fdfdfd; transition: all 0.2s; }
        input:focus { outline: none; border-color: #c89d7c; background-color: #fff; }
        button { width: 100%; height: 50px; background: #3d2314; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        button:hover { background: #5c3826; }
        button:active { background: #2c1a11; }
        .links { text-align: center; margin-top: 20px; }
        a { color: #c89d7c; text-decoration: none; font-size: 14px; font-weight: 600; }
        .error-msg { color: #cf6679; font-size: 13px; font-weight: 500; margin-bottom: 15px; padding: 10px; background: rgba(207,102,121,0.08); border-radius: 8px; display: none; }
        
        /* Mobile View Optimization */
        @media (max-width: 480px) {
            body { background-color: white; }
            .phone-container { width: 100%; height: 100vh; max-height: none; border-radius: 0; border: none; box-shadow: none; padding: 60px 24px 40px 24px; }
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div>
            <h2>Khoga<span>Café</span></h2>
            <p style="text-align: center; color: #8c766c; font-size: 12px; margin-top: 5px; margin-bottom: 40px; letter-spacing: 1px; font-weight: 600; text-transform: uppercase;">Staff Portal</p>
            
            <div class="error-msg" id="error-alert">Tên đăng nhập hoặc mật khẩu không chính xác.</div>

            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" placeholder="Nhập username" value="cashier01">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" value="123456">
            </div>
        </div>

        <div>
            <button onclick="handleLogin()">ĐĂNG NHẬP</button>
            <div class="links">
                <a href="forgot_password.html">Quên mật khẩu?</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const alertBox = document.getElementById('error-alert');
            
            alertBox.style.display = 'none';

            if (username === 'admin01' && pass === 'admin123') {
                alert("Đăng nhập vai trò Admin HQ thành công!");
                window.location.href = "../admin_hq_mockups/dashboard_web.html";
            } else if (username === 'manager01' && pass === '12345678') {
                alert("Đăng nhập vai trò Store Manager thành công!");
                window.location.href = "../store_manager_mockups/dashboard.html";
            } else if (username === 'cashier01' && pass === '12345678') {
                alert("Đăng nhập vai trò Thu Ngân (POS) thành công!");
                window.location.href = "../cashier_pos_mockups/open_shift.html";
            } else if (username === 'barista01' && pass === '12345678') {
                alert("Đăng nhập vai trò Pha Chế (Barista) thành công!");
                window.location.href = "../barista_monitor_mockups/barista_queue.html";
            } else {
                alertBox.style.display = 'block';
            }
        }
    </script>
</body>
</html>
