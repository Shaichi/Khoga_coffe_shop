<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Doanh Thu (Xuất báo cáo Modal) - Store Console</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .phone-container { width: 375px; height: 100vh; max-height: 812px; background: white; border: 1px solid #eee; border-radius: 24px; padding: 24px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; position: relative; overflow: hidden; }
        
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: #8c766c; font-size: 14px; display: flex; align-items: center; gap: 4px; font-weight: 500; }
        .title { color: #2c1a11; font-size: 20px; font-weight: 700; margin: 0; }
        .empty-header-right { width: 60px; }

        .date-picker-row { margin-bottom: 20px; }
        .date-input { width: 100%; height: 44px; border: 1.5px solid #eaddd3; border-radius: 12px; padding: 0 16px; font-size: 14px; font-weight: 600; color: #3d2314; outline: none; box-sizing: border-box; text-align: center; }

        .reports-content { flex-grow: 1; overflow-y: auto; padding-right: 2px; }

        .section-card { background: #fdfdfd; border: 1.5px solid #eaddd3; border-radius: 16px; padding: 16px; margin-bottom: 18px; }
        .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #8c766c; letter-spacing: 0.5px; margin-bottom: 12px; border-bottom: 1px solid #f5eee8; padding-bottom: 6px; }
        
        .metric-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .metric-value { color: #2c1a11; font-weight: 700; }

        .pay-breakdown { display: flex; flex-direction: column; gap: 8px; }
        .pay-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .pay-name { display: flex; align-items: center; gap: 8px; color: #3d2314; font-weight: 500; }
        .pay-dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-cash { background: #4caf50; }
        .dot-card { background: #2196f3; }
        .dot-qr { background: #ff9800; }

        /* Modal styling - FORCED VISIBLE FOR FIGMA IMPORT */
        .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(44,26,17,0.6); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 1; pointer-events: auto; }
        
        .modal-card { width: 310px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); box-sizing: border-box; transform: scale(1); }
        .modal-title { font-size: 16px; font-weight: 700; color: #2c1a11; margin: 0 0 15px 0; text-align: center; }
        
        .modal-group { margin-bottom: 12px; }
        .modal-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #8c766c; margin-bottom: 6px; }
        
        .radio-group { display: flex; flex-direction: column; gap: 6px; }
        .radio-option { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #3d2314; cursor: pointer; }
        .radio-option input { accent-color: #c89d7c; }

        .modal-select { width: 100%; height: 38px; border: 1.5px solid #eaddd3; border-radius: 8px; padding: 0 8px; font-size: 13px; color: #3d2314; outline: none; }
        
        .modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .modal-btn { height: 40px; border-radius: 10px; font-size: 13px; font-weight: 600; display: flex; justify-content: center; align-items: center; cursor: pointer; text-decoration: none; border: none; }
        .btn-modal-primary { background: #3d2314; color: white; }
        .btn-modal-secondary { background: white; color: #3d2314; border: 1.5px solid #eaddd3; }

        .btn { height: 48px; border-radius: 12px; font-size: 14px; font-weight: 600; display: flex; justify-content: center; align-items: center; cursor: pointer; text-decoration: none; border: none; }
        .btn-primary { background: #3d2314; color: white; width: 100%; margin-bottom: 10px; }
        .btn-secondary { background: white; color: #3d2314; border: 1.5px solid #eaddd3; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="phone-container">
        <!-- Mock Background Screen (dimmed) -->
        <div style="flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; opacity: 0.5;">
            <div class="header">
                <span class="back-btn">&larr; Quay lại</span>
                <h1 class="title">Báo Cáo Doanh Thu</h1>
                <div class="empty-header-right"></div>
            </div>

            <div class="date-picker-row">
                <input type="text" class="date-input" value="2026-05-24" readonly>
            </div>

            <div class="reports-content">
                <div class="section-card">
                    <div class="section-title">Tóm tắt doanh số chi nhánh</div>
                    <div class="metric-row">
                        <span>Doanh thu thuần</span>
                        <span class="metric-value">12,450,000 VND</span>
                    </div>
                </div>
            </div>
            
            <div>
                <button class="btn btn-primary" disabled>XUẤT BÁO CÁO</button>
            </div>
        </div>

        <!-- Export Report Modal (Forced Visible) -->
        <div class="modal-overlay" id="exportModal">
            <div class="modal-card">
                <h3 class="modal-title">Xuất Báo Cáo</h3>
                
                <!-- Format Selection -->
                <div class="modal-group">
                    <span class="modal-label">Định dạng file xuất</span>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="exportFormat" value="pdf" checked>
                            Tài liệu PDF (.pdf)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="exportFormat" value="xlsx">
                            Bảng tính Excel (.xlsx)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="exportFormat" value="csv">
                            File dữ liệu CSV (.csv)
                        </label>
                    </div>
                </div>

                <!-- Scope Selection -->
                <div class="modal-group">
                    <label class="modal-label" for="dataScope">Phạm vi dữ liệu</label>
                    <select id="dataScope" class="modal-select">
                        <option value="sales">Báo cáo Doanh thu Bán hàng</option>
                        <option value="discrepancy">Báo cáo Lệch két ca trực</option>
                        <option value="waste">Báo cáo Hao hụt & Huỷ nguyên liệu</option>
                    </select>
                </div>

                <!-- Modal Buttons -->
                <div class="modal-buttons">
                    <button class="modal-btn btn-modal-secondary">HỦY</button>
                    <button class="modal-btn btn-modal-primary">TẢI XUỐNG</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
