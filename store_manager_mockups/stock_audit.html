<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm Kê Kho - Store Console</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fcfaf7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .phone-container { width: 375px; height: 100vh; max-height: 812px; background: white; border: 1px solid #eee; border-radius: 24px; padding: 24px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; }
        
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .back-btn { text-decoration: none; color: #8c766c; display: flex; align-items: center; }
        .title { color: #2c1a11; font-size: 20px; font-weight: 700; margin: 0; flex-grow: 1; text-align: center; margin-right: 24px; }

        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 13px; font-weight: 700; color: #5c3826; margin-bottom: 6px; }
        .form-select, .form-input { width: 100%; height: 44px; background: #fdfdfd; border: 1.5px solid #eaddd3; border-radius: 12px; padding: 0 16px; box-sizing: border-box; font-size: 14px; color: #2c1a11; transition: all 0.2s; }
        .form-select:focus, .form-input:focus { outline: none; border-color: #c89d7c; background: #fff; }
        
        .readonly-value { display: flex; align-items: center; background: #f5eee8; border: 1.5px solid transparent; border-radius: 12px; height: 44px; padding: 0 16px; font-size: 14px; color: #3d2314; font-weight: 600; box-sizing: border-box; }

        textarea.form-input { height: 80px; padding: 12px 16px; font-family: inherit; resize: none; }

        .alert-box { background: #fff8e1; border: 1px solid rgba(255,179,0,0.3); border-radius: 12px; padding: 12px; color: #b78103; font-size: 12px; font-weight: 600; margin-bottom: 18px; display: none; line-height: 1.4; }

        .error-message { background: #fde8eb; border: 1px solid rgba(207,102,121,0.2); border-radius: 12px; padding: 12px; color: #cf6679; font-size: 13px; font-weight: 500; margin-bottom: 18px; display: none; }
        .success-message { background: #e8f5e9; border: 1px solid rgba(46,125,50,0.2); border-radius: 12px; padding: 12px; color: #2e7d32; font-size: 13px; font-weight: 500; margin-bottom: 18px; display: none; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 48px; border-radius: 12px; font-size: 14px; font-weight: 600; display: flex; justify-content: center; align-items: center; cursor: pointer; text-decoration: none; transition: all 0.2s; border: none; }
        .btn-primary { background: #3d2314; color: white; }
        .btn-primary:hover { background: #5c3826; }
        .btn-secondary { background: white; color: #3d2314; border: 1.5px solid #eaddd3; }
        .btn-secondary:hover { border-color: #c89d7c; background: #fdfaf7; }

        @media (max-width: 480px) {
            body { background-color: white; }
            .phone-container { width: 100%; height: 100vh; max-height: none; border-radius: 0; border: none; box-shadow: none; padding: 50px 20px 24px 20px; }
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <!-- Scrollable Form Area -->
        <div style="overflow-y: auto; flex-grow: 1; padding-right: 2px;">
            <div class="header">
                <a href="stock.html" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </a>
                <h1 class="title">Kiểm Kê Kho</h1>
            </div>

            <div id="errorBox" class="error-message"></div>
            <div id="successBox" class="success-message"></div>
            <div id="alertBox" class="alert-box">
                ⚠️ Có sai lệch giữa tồn kho thực tế và sổ sách. Giải trình sai lệch là bắt buộc!
            </div>

            <form id="auditForm" onsubmit="handleSubmit(event)">
                <!-- Item Selection -->
                <div class="form-group">
                    <label class="form-label" for="itemName">Nguyên liệu kiểm kê *</label>
                    <select id="itemName" class="form-select" required>
                        <option value="" disabled selected>Chọn nguyên liệu...</option>
                        <option value="STK-01" data-stock="1.2" data-unit="kg">Cà phê hạt Espresso</option>
                        <option value="STK-02" data-stock="12.0" data-unit="lít">Sữa tươi tiệt trùng</option>
                        <option value="STK-03" data-stock="0.8" data-unit="lít">Siro hương đào</option>
                        <option value="STK-04" data-stock="150.0" data-unit="cái">Ly giấy nóng 12oz</option>
                        <option value="STK-05" data-stock="8.5" data-unit="kg">Đường cát trắng túi</option>
                    </select>
                </div>

                <!-- Expected Quantity -->
                <div class="form-group">
                    <label class="form-label">Tồn kho trên hệ thống</label>
                    <div id="expectedVal" class="readonly-value">-</div>
                </div>

                <!-- Actual Quantity -->
                <div class="form-group">
                    <label class="form-label" id="actualLabel" for="actualCount">Tồn kho thực tế kiểm đếm *</label>
                    <input type="number" step="any" id="actualCount" class="form-input" placeholder="Nhập số lượng thực tế..." required oninput="checkDiscrepancy()">
                </div>

                <!-- Discrepancy Note -->
                <div class="form-group">
                    <label class="form-label" for="notes" id="notesLabel">Lý do sai lệch (Nếu có)</label>
                    <textarea id="notes" class="form-input" placeholder="Giải trình lý do chênh lệch (Ví dụ: Hao hụt trong pha chế, đổ vỡ nguyên liệu...)"></textarea>
                </div>
            </form>
        </div>

        <!-- Footer Buttons -->
        <div class="btn-row">
            <a href="stock.html" class="btn btn-secondary">HỦY</a>
            <button type="submit" form="auditForm" class="btn btn-primary">LƯU KẾT QUẢ</button>
        </div>
    </div>

    <script>
        let currentStockVal = null;
        let currentUnit = "";

        // Read query parameter if redirected from stock list specific item
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const itemId = urlParams.get('item');
            if (itemId) {
                const selectEl = document.getElementById('itemName');
                selectEl.value = itemId;
                // Trigger change event programmatically
                selectEl.dispatchEvent(new Event('change'));
            }
        });

        document.getElementById('itemName').addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            currentStockVal = parseFloat(selectedOption.getAttribute('data-stock'));
            currentUnit = selectedOption.getAttribute('data-unit');
            
            document.getElementById('expectedVal').textContent = `${currentStockVal} ${currentUnit}`;
            document.getElementById('actualLabel').textContent = `Tồn kho thực tế kiểm đếm (${currentUnit}) *`;
            
            // Re-check discrepancy
            checkDiscrepancy();
        });

        function checkDiscrepancy() {
            if (currentStockVal === null) return;

            const actualInput = document.getElementById('actualCount').value;
            const alertBox = document.getElementById('alertBox');
            const notesLabel = document.getElementById('notesLabel');
            const notesInput = document.getElementById('notes');

            if (actualInput === "") {
                alertBox.style.display = 'none';
                notesLabel.innerHTML = "Lý do sai lệch (Nếu có)";
                notesInput.style.borderColor = "#eaddd3";
                return;
            }

            const actualVal = parseFloat(actualInput);
            
            // Check if there is discrepancy
            if (Math.abs(actualVal - currentStockVal) > 0.0001) {
                alertBox.style.display = 'block';
                notesLabel.innerHTML = 'Lý do sai lệch (Bắt buộc) <span style="color: #cf6679;">*</span>';
                notesInput.style.borderColor = "#ffb300";
            } else {
                alertBox.style.display = 'none';
                notesLabel.innerHTML = "Lý do sai lệch (Nếu có)";
                notesInput.style.borderColor = "#eaddd3";
            }
        }

        function handleSubmit(e) {
            e.preventDefault();
            const actualCountInput = document.getElementById('actualCount').value;
            const notes = document.getElementById('notes').value.trim();
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');

            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            if (currentStockVal === null) {
                errorBox.textContent = "Vui lòng chọn nguyên liệu cần kiểm kê.";
                errorBox.style.display = 'block';
                return;
            }

            const actualCount = parseFloat(actualCountInput);

            // Validation: Non-negative check
            if (isNaN(actualCount) || actualCount < 0) {
                errorBox.textContent = "Số lượng kiểm kê thực tế phải lớn hơn hoặc bằng 0.";
                errorBox.style.display = 'block';
                return;
            }

            // BR-32 validation: notes required if actual !== expected
            const hasDiscrepancy = Math.abs(actualCount - currentStockVal) > 0.0001;
            if (hasDiscrepancy && notes === "") {
                errorBox.textContent = "Giải trình lý do chênh lệch tồn kho thực tế là bắt buộc (Theo BR-32).";
                errorBox.style.display = 'block';
                document.getElementById('notes').focus();
                return;
            }

            // Success simulation
            successBox.textContent = "Lưu kết quả kiểm kê thành công! Đang đồng bộ...";
            successBox.style.display = 'block';
            
            // Disable inputs
            const inputs = document.querySelectorAll('input, select, textarea, button');
            inputs.forEach(input => input.disabled = true);

            setTimeout(() => {
                window.location.href = "stock.html";
            }, 1500);
        }
    </script>
</body>
</html>
