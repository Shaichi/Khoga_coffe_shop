<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xuất Kho - Store Console</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fcfaf7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .phone-container { width: 375px; height: 100vh; max-height: 812px; background: white; border: 1px solid #eee; border-radius: 24px; padding: 24px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; }
        
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .back-btn { text-decoration: none; color: #8c766c; display: flex; align-items: center; }
        .title { color: #2c1a11; font-size: 20px; font-weight: 700; margin: 0; flex-grow: 1; text-align: center; margin-right: 24px; }

        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 13px; font-weight: 700; color: #5c3826; margin-bottom: 6px; }
        .form-select, .form-input { width: 100%; height: 44px; background: #fdfdfd; border: 1.5px solid #eaddd3; border-radius: 12px; padding: 0 16px; box-sizing: border-box; font-size: 14px; color: #2c1a11; transition: all 0.2s; }
        .form-select:focus, .form-input:focus { outline: none; border-color: #c89d7c; background: #fff; }
        
        textarea.form-input { height: 80px; padding: 12px 16px; font-family: inherit; resize: none; }

        .current-stock-badge { display: inline-block; background: #f5eee8; color: #5c3826; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 6px; margin-top: 4px; }

        .error-message { background: #fde8eb; border: 1px solid rgba(207,102,121,0.2); border-radius: 12px; padding: 12px; color: #cf6679; font-size: 13px; font-weight: 500; margin-bottom: 18px; display: none; }
        .success-message { background: #e8f5e9; border: 1px solid rgba(46,125,50,0.2); border-radius: 12px; padding: 12px; color: #2e7d32; font-size: 13px; font-weight: 500; margin-bottom: 18px; display: none; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 48px; border-radius: 12px; font-size: 14px; font-weight: 600; display: flex; justify-content: center; align-items: center; cursor: pointer; text-decoration: none; transition: all 0.2s; border: none; }
        .btn-primary { background: #3d2314; color: white; }
        .btn-primary:hover { background: #5c3826; }
        .btn-secondary { background: white; color: #3d2314; border: 1.5px solid #eaddd3; }
        .btn-secondary:hover { border-color: #c89d7c; background: #fdfaf7; }

        @media (max-width: 480px) {
            body { background-color: white; }
            .phone-container { width: 100%; height: 100vh; max-height: none; border-radius: 0; border: none; box-shadow: none; padding: 50px 20px 24px 20px; }
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <!-- Scrollable Form Area -->
        <div style="overflow-y: auto; flex-grow: 1; padding-right: 2px;">
            <div class="header">
                <a href="stock.html" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </a>
                <h1 class="title">Xuất Kho</h1>
            </div>

            <div id="errorBox" class="error-message"></div>
            <div id="successBox" class="success-message"></div>

            <form id="exportForm" onsubmit="handleSubmit(event)">
                <!-- Item Selection -->
                <div class="form-group">
                    <label class="form-label" for="itemName">Tên nguyên liệu *</label>
                    <select id="itemName" class="form-select" required>
                        <option value="" disabled selected>Chọn nguyên liệu...</option>
                        <option value="STK-01" data-stock="1.2" data-unit="kg">Cà phê hạt Espresso</option>
                        <option value="STK-02" data-stock="12.0" data-unit="lít">Sữa tươi tiệt trùng</option>
                        <option value="STK-03" data-stock="0.8" data-unit="lít">Siro hương đào</option>
                        <option value="STK-04" data-stock="150.0" data-unit="cái">Ly giấy nóng 12oz</option>
                        <option value="STK-05" data-stock="8.5" data-unit="kg">Đường cát trắng túi</option>
                    </select>
                    <div id="stockBadge" style="display: none;">
                        <span class="current-stock-badge" id="stockText">Tồn kho hiện tại: -</span>
                    </div>
                </div>

                <!-- Quantity -->
                <div class="form-group">
                    <label class="form-label" id="qtyLabel" for="quantity">Số lượng xuất *</label>
                    <input type="number" step="any" id="quantity" class="form-input" placeholder="Ví dụ: 2.0" required>
                </div>

                <!-- Reason -->
                <div class="form-group">
                    <label class="form-label" for="reason">Lý do xuất *</label>
                    <select id="reason" class="form-select" required>
                        <option value="" disabled selected>Chọn lý do...</option>
                        <option value="usage">Sử dụng hoạt động hàng ngày</option>
                        <option value="damage">Hao hụt / Hỏng (Hết hạn, ôi thiu...)</option>
                        <option value="loss">Thất thoát / Mất mát</option>
                    </select>
                </div>

                <!-- Notes -->
                <div class="form-group">
                    <label class="form-label" for="notes">Ghi chú</label>
                    <textarea id="notes" class="form-input" placeholder="Nhập lý do chi tiết (ví dụ: Sữa bị chua, cốc bị bẹp...)"></textarea>
                </div>
            </form>
        </div>

        <!-- Footer Buttons -->
        <div class="btn-row">
            <a href="stock.html" class="btn btn-secondary">HỦY</a>
            <button type="submit" form="exportForm" class="btn btn-primary">XÁC NHẬN</button>
        </div>
    </div>

    <script>
        let currentMaxStock = 0;
        let currentUnitName = "";

        document.getElementById('itemName').addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            currentMaxStock = parseFloat(selectedOption.getAttribute('data-stock'));
            currentUnitName = selectedOption.getAttribute('data-unit');
            
            const badge = document.getElementById('stockBadge');
            const text = document.getElementById('stockText');
            text.textContent = `Tồn kho hiện tại: ${currentMaxStock} ${currentUnitName}`;
            badge.style.display = 'block';

            const qtyLabel = document.getElementById('qtyLabel');
            qtyLabel.textContent = `Số lượng xuất (${currentUnitName}) *`;
        });

        function handleSubmit(e) {
            e.preventDefault();
            const quantity = parseFloat(document.getElementById('quantity').value);
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');

            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            if (isNaN(quantity) || quantity <= 0) {
                errorBox.textContent = "Vui lòng nhập số lượng xuất là số dương lớn hơn 0.";
                errorBox.style.display = 'block';
                return;
            }

            // AT1: Insufficient Stock check
            const selectedItem = document.getElementById('itemName').value;
            if (!selectedItem) {
                errorBox.textContent = "Vui lòng chọn nguyên liệu.";
                errorBox.style.display = 'block';
                return;
            }

            if (quantity > currentMaxStock) {
                errorBox.textContent = `Không thể xuất kho. Số lượng hiện tại trong kho (${currentMaxStock} ${currentUnitName}) không đủ để xuất ${quantity} ${currentUnitName}.`;
                errorBox.style.display = 'block';
                return;
            }

            // Success simulation
            successBox.textContent = "Xuất kho thành công! Đang chuyển hướng...";
            successBox.style.display = 'block';
            
            // Disable inputs
            const inputs = document.querySelectorAll('input, select, textarea, button');
            inputs.forEach(input => input.disabled = true);

            setTimeout(() => {
                window.location.href = "stock.html";
            }, 1500);
        }
    </script>
</body>
</html>
