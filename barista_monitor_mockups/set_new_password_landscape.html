<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Mật Khẩu Mới - Barista Monitor</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .tablet-container { width: 736px; height: 414px; background: white; border: 1px solid #ddd; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; box-sizing: border-box; overflow: hidden; }
        .brand-side { width: 45%; background: #3d2314; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; box-sizing: border-box; text-align: center; }
        .form-side { width: 55%; padding: 30px 40px; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; }
        .brand-logo { font-size: 32px; font-weight: 800; letter-spacing: 1px; color: #fff; margin-bottom: 10px; }
        .brand-sub { font-size: 13px; color: #c89d7c; text-transform: uppercase; font-weight: 600; letter-spacing: 2px; margin-bottom: 20px; }
        
        h2 { color: #2c1a11; font-size: 20px; font-weight: 700; margin: 0 0 5px 0; }
        .subtitle { color: #8c766c; font-size: 12px; margin: 0 0 15px 0; }
        
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 4px; color: #5c3826; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; height: 38px; padding: 8px 12px; border: 1px solid #e5dbcf; border-radius: 8px; box-sizing: border-box; font-size: 14px; background-color: #fdfdfd; transition: all 0.2s; }
        input:focus { outline: none; border-color: #c89d7c; background-color: #fff; }
        
        .complexity-box { background: #fdfaf7; border: 1px solid #eaddd3; padding: 8px 12px; border-radius: 8px; font-size: 11px; color: #8c766c; margin-top: 10px; line-height: 1.4; }
        
        .actions { display: flex; align-items: center; justify-content: flex-end; margin-top: 15px; }
        button { height: 40px; padding: 0 25px; background: #3d2314; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #5c3826; }
        
        @media (max-width: 760px) {
            body { background: #fdfaf7; }
            .tablet-container { width: 100vw; height: 100vh; border-radius: 0; border: none; flex-direction: column; }
            .brand-side { width: 100%; height: 35%; padding: 20px; }
            .form-side { width: 100%; height: 65%; padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="tablet-container">
        <div class="brand-side">
            <div class="brand-logo">EspressoHQ</div>
            <div class="brand-sub">Đặt lại mật khẩu</div>
        </div>
        <div class="form-side">
            <h2>Mật Khẩu Mới</h2>
            <p class="subtitle">Tạo mật khẩu bảo mật mới cho tài khoản Barista của bạn.</p>
            
            <div class="form-group">
                <label>Mật khẩu mới</label>
                <input type="password" id="newpass" placeholder="Mật khẩu mới">
            </div>
            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirm" placeholder="Xác nhận lại mật khẩu">
            </div>
            
            <div class="complexity-box">
                <b style="color: #5c3826; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; display: block; margin-bottom: 2px;">Độ phức tạp bắt buộc</b>
                Mật khẩu có độ dài ít nhất 8 ký tự, bao gồm chữ viết hoa, chữ viết thường, chữ số và ký tự đặc biệt.
            </div>
            
            <div class="actions">
                <button onclick="handleSave()">LƯU MẬT KHẨU</button>
            </div>
        </div>
    </div>

    <script>
        function handleSave() {
            const pass = document.getElementById('newpass').value;
            const confirm = document.getElementById('confirm').value;
            if (pass.length < 8) {
                alert("Mật khẩu phải từ 8 ký tự trở lên.");
                return;
            }
            if (pass !== confirm) {
                alert("Mật khẩu xác nhận không khớp.");
                return;
            }
            alert("Đổi mật khẩu thành công!");
            window.location.href = "login_landscape.html";
        }
    </script>
</body>
</html>
