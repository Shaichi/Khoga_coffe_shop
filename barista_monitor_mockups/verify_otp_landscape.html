<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Thực OTP - Barista Monitor</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .tablet-container { width: 736px; height: 414px; background: white; border: 1px solid #ddd; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; box-sizing: border-box; overflow: hidden; }
        .brand-side { width: 45%; background: #3d2314; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; box-sizing: border-box; text-align: center; }
        .form-side { width: 55%; padding: 40px; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; }
        .brand-logo { font-size: 32px; font-weight: 800; letter-spacing: 1px; color: #fff; margin-bottom: 10px; }
        .brand-sub { font-size: 13px; color: #c89d7c; text-transform: uppercase; font-weight: 600; letter-spacing: 2px; margin-bottom: 20px; }
        
        h2 { color: #2c1a11; font-size: 22px; font-weight: 700; margin: 0 0 5px 0; }
        .subtitle { color: #8c766c; font-size: 13px; margin: 0 0 20px 0; line-height: 1.4; }
        
        .otp-container { display: flex; justify-content: space-between; gap: 8px; margin: 15px 0 25px 0; }
        .otp-input { width: 38px; height: 44px; text-align: center; font-size: 20px; font-weight: 700; border: 1px solid #e5dbcf; border-radius: 10px; background-color: #fdfdfd; transition: all 0.2s; }
        .otp-input:focus { outline: none; border-color: #c89d7c; background-color: #fff; box-shadow: 0 0 0 3px rgba(200, 157, 124, 0.15); }
        
        .actions { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        button { height: 44px; padding: 0 25px; background: #3d2314; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #5c3826; }
        
        a { color: #c89d7c; text-decoration: none; font-size: 13px; font-weight: 600; }
        a:hover { color: #5c3826; }
        
        @media (max-width: 760px) {
            body { background: #fdfaf7; }
            .tablet-container { width: 100vw; height: 100vh; border-radius: 0; border: none; flex-direction: column; }
            .brand-side { width: 100%; height: 35%; padding: 20px; }
            .form-side { width: 100%; height: 65%; padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="tablet-container">
        <div class="brand-side">
            <div class="brand-logo">Khoga<span>Café</span></div>
            <div class="brand-sub">Xác thực tài khoản</div>
        </div>
        <div class="form-side">
            <h2>Xác Thực OTP</h2>
            <p class="subtitle">Nhập mã xác thực gồm 6 chữ số đã được gửi tới email của bạn.</p>
            
            <div class="otp-container">
                <input type="text" class="otp-input" maxlength="1" oninput="moveToNext(this)" id="o1" autofocus>
                <input type="text" class="otp-input" maxlength="1" oninput="moveToNext(this)" id="o2">
                <input type="text" class="otp-input" maxlength="1" oninput="moveToNext(this)" id="o3">
                <input type="text" class="otp-input" maxlength="1" oninput="moveToNext(this)" id="o4">
                <input type="text" class="otp-input" maxlength="1" oninput="moveToNext(this)" id="o5">
                <input type="text" class="otp-input" maxlength="1" oninput="moveToNext(this)" id="o6">
            </div>
            
            <div class="actions">
                <a href="forgot_password_landscape.html">Gửi lại mã xác thực</a>
                <button onclick="handleVerify()">XÁC NHẬN</button>
            </div>
        </div>
    </div>

    <script>
        function moveToNext(current) {
            if (current.value.length >= 1) {
                const inputs = document.getElementsByClassName('otp-input');
                for (let i = 0; i < inputs.length; i++) {
                    if (inputs[i] === current && i < inputs.length - 1) {
                        inputs[i + 1].focus();
                        break;
                    }
                }
            }
        }
        function handleVerify() {
            window.location.href = "set_new_password_landscape.html";
        }
    </script>
</body>
</html>
