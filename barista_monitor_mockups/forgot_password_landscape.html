<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - Barista Monitor</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .tablet-container { width: 736px; height: 414px; background: white; border: 1px solid #ddd; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; box-sizing: border-box; overflow: hidden; }
        .brand-side { width: 45%; background: #3d2314; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; box-sizing: border-box; text-align: center; }
        .form-side { width: 55%; padding: 40px; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; }
        .brand-logo { font-size: 32px; font-weight: 800; letter-spacing: 1px; color: #fff; margin-bottom: 10px; }
        .brand-sub { font-size: 13px; color: #c89d7c; text-transform: uppercase; font-weight: 600; letter-spacing: 2px; margin-bottom: 20px; }
        
        h2 { color: #2c1a11; font-size: 22px; font-weight: 700; margin: 0 0 5px 0; }
        .subtitle { color: #8c766c; font-size: 13px; margin: 0 0 25px 0; line-height: 1.4; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: #5c3826; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; height: 42px; padding: 10px 12px; border: 1px solid #e5dbcf; border-radius: 10px; box-sizing: border-box; font-size: 15px; background-color: #fdfdfd; transition: all 0.2s; }
        input:focus { outline: none; border-color: #c89d7c; background-color: #fff; }
        
        .actions { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
        button { height: 44px; padding: 0 25px; background: #3d2314; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #5c3826; }
        
        a { color: #c89d7c; text-decoration: none; font-size: 13px; font-weight: 600; }
        a:hover { color: #5c3826; }
        
        @media (max-width: 760px) {
            body { background: #fdfaf7; }
            .tablet-container { width: 100vw; height: 100vh; border-radius: 0; border: none; flex-direction: column; }
            .brand-side { width: 100%; height: 35%; padding: 20px; }
            .form-side { width: 100%; height: 65%; padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="tablet-container">
        <div class="brand-side">
            <div class="brand-logo">Khoga<span>Café</span></div>
            <div class="brand-sub">Khôi phục mật khẩu</div>
        </div>
        <div class="form-side">
            <h2>Quên Mật Khẩu?</h2>
            <p class="subtitle">Nhập email đăng ký tài khoản của bạn để nhận mã xác thực OTP gửi qua hệ thống.</p>
            
            <div class="form-group">
                <label>Email liên kết</label>
                <input type="email" id="email" placeholder="example@khogacafe.com" value="barista@khogacafe.com">
            </div>
            
            <div class="actions">
                <a href="login_landscape.html">Quay lại đăng nhập</a>
                <button onclick="handleForgot()">GỬI MÃ OTP</button>
            </div>
        </div>
    </div>

    <script>
        function handleForgot() {
            const email = document.getElementById('email').value;
            if (email.includes('@')) {
                window.location.href = "verify_otp_landscape.html";
            } else {
                alert("Vui lòng nhập đúng định dạng email.");
            }
        }
    </script>
</body>
</html>
