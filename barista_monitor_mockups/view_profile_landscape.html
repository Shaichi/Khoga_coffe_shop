<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Cá Nhân - Barista Monitor</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .tablet-container { width: 736px; height: 414px; background: white; border: 1px solid #ddd; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; position: relative; }
        
        /* Header */
        .queue-header { background: #3d2314; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .queue-title { margin: 0; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
        .queue-meta { font-size: 12px; color: #c89d7c; font-weight: 600; }
        .exit-btn { text-decoration: none; color: #c89d7c; font-size: 12px; font-weight: 600; }

        /* Profile Layout */
        .profile-layout { display: flex; flex-grow: 1; background: #fdfaf7; overflow: hidden; }
        
        /* Left Column: Avatar & Quick Info */
        .profile-side { width: 35%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1.5px solid #eaddd3; padding: 20px; box-sizing: border-box; }
        .avatar { width: 90px; height: 90px; background: #eaddd3; color: #5c3826; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: 700; border: 3px solid #c89d7c; margin-bottom: 15px; }
        .profile-name { font-size: 18px; font-weight: 700; color: #2c1a11; text-align: center; margin-bottom: 5px; }
        .profile-role { font-size: 11px; background: #3d2314; color: white; padding: 3px 8px; border-radius: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Right Column: Detail Fields & Buttons */
        .profile-details { width: 65%; padding: 24px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; }
        
        .profile-item { display: flex; flex-direction: column; border-bottom: 1px solid #f2ede8; padding-bottom: 6px; }
        .profile-label { font-size: 11px; color: #8c766c; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
        .profile-value { font-size: 14px; color: #2c1a11; font-weight: 600; }
        
        .actions-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn-outline { flex: 1; height: 38px; background: transparent; color: #5c3826; border: 1.5px solid #eaddd3; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; text-decoration: none; transition: all 0.2s; box-sizing: border-box; }
        .btn-outline:hover { background: #fdfaf7; border-color: #c89d7c; }
        .btn-danger { height: 38px; width: 100px; background: transparent; color: #cf6679; border: 1.5px solid rgba(207,102,121,0.2); border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s; box-sizing: border-box; }
        .btn-danger:hover { background: rgba(207,102,121,0.05); border-color: #cf6679; }

        @media (max-width: 760px) {
            body { background: #fdfaf7; }
            .tablet-container { width: 100vw; height: 100vh; border-radius: 0; border: none; }
            .profile-layout { flex-direction: column; overflow-y: auto; }
            .profile-side { width: 100%; border-right: none; border-bottom: 1.5px solid #eaddd3; padding: 30px 20px; }
            .profile-details { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="tablet-container">
        <!-- Header -->
        <div class="queue-header">
            <h1 class="queue-title">Thông Tin Cá Nhân</h1>
            <div class="queue-meta">Chi nhánh: Nguyễn Du | Quầy: BAR-01</div>
            <a href="barista_queue.html" class="exit-btn">Quay lại quầy</a>
        </div>

        <!-- Profile Layout -->
        <div class="profile-layout">
            <div class="profile-side">
                <div class="avatar">PC</div>
                <div class="profile-name" id="disp-name">Trần Minh Pha Chế</div>
                <span class="profile-role">BARISTA</span>
            </div>
            
            <div class="profile-details">
                <div class="details-grid">
                    <div class="profile-item">
                        <span class="profile-label">Tên đăng nhập</span>
                        <span class="profile-value">barista01</span>
                    </div>
                    <div class="profile-item">
                        <span class="profile-label">Chi nhánh</span>
                        <span class="profile-value">Nguyễn Du Branch</span>
                    </div>
                    <div class="profile-item">
                        <span class="profile-label">Email liên hệ</span>
                        <span class="profile-value" id="disp-email">barista01@khogacafe.com</span>
                    </div>
                    <div class="profile-item">
                        <span class="profile-label">Số điện thoại</span>
                        <span class="profile-value" id="disp-phone">0912345678</span>
                    </div>
                </div>
                
                <div class="actions-row">
                    <a href="edit_profile_landscape.html" class="btn-outline">Chỉnh sửa thông tin</a>
                    <a href="change_password_landscape.html" class="btn-outline">Đổi mật khẩu</a>
                    <button class="btn-danger" onclick="handleLogout()">Đăng xuất</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            if (localStorage.getItem('barista_email')) {
                document.getElementById('disp-email').innerText = localStorage.getItem('barista_email');
            }
            if (localStorage.getItem('barista_phone')) {
                document.getElementById('disp-phone').innerText = localStorage.getItem('barista_phone');
            }
        }
        function handleLogout() {
            if (confirm("Bạn có chắc chắn muốn đăng xuất?")) {
                window.location.href = "login_landscape.html";
            }
        }
    </script>
</body>
</html>
