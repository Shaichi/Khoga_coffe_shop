<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Lỗi Pha Chế - Barista Portal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        /* Landscape container (simulate tablet / horizontal phone) */
        .tablet-container { width: 736px; height: 414px; background: white; border: 1px solid #ddd; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; position: relative; }
        
        /* Header matching barista_queue.html */
        .queue-header { background: #3d2314; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .queue-title { margin: 0; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
        .back-btn { text-decoration: none; color: #ffab91; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .back-btn:hover { color: white; }

        /* Split content layout */
        .content-layout { display: flex; flex-grow: 1; overflow: hidden; background: #fdfaf7; }
        .column { flex: 1; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; overflow-y: auto; }
        .column-left { border-right: 1.5px solid #eaddd3; }

        .section-title { font-size: 12px; font-weight: 700; color: #8c766c; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; border-bottom: 1px solid #eaddd3; padding-bottom: 4px; }

        /* Information cards */
        .order-card { background: white; border: 1.5px solid #eaddd3; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
        .order-title { font-weight: 700; color: #2c1a11; font-size: 13px; margin-bottom: 6px; }
        .order-desc { font-size: 12px; color: #5c3826; font-weight: 600; line-height: 1.4; background: #fbf9f6; border-radius: 6px; padding: 8px 10px; }

        .warning-card { background: #fff3e0; border: 1px solid rgba(255,152,0,0.3); border-radius: 12px; padding: 12px; color: #e65100; font-size: 11px; line-height: 1.4; font-weight: 600; }

        /* Form elements */
        .form-group { margin-bottom: 12px; }
        .form-label { display: block; font-size: 12px; font-weight: 700; color: #5c3826; margin-bottom: 6px; }
        .form-select, .form-input { width: 100%; height: 38px; background: white; border: 1.5px solid #eaddd3; border-radius: 8px; padding: 0 10px; box-sizing: border-box; font-size: 13px; color: #2c1a11; transition: all 0.2s; }
        .form-select:focus, .form-input:focus { outline: none; border-color: #c89d7c; }
        
        textarea.form-input { height: 75px; padding: 8px 10px; font-family: inherit; resize: none; }

        .error-message { background: #fde8eb; border: 1px solid rgba(207,102,121,0.2); border-radius: 10px; padding: 10px; color: #cf6679; font-size: 12px; font-weight: 500; margin-bottom: 10px; display: none; }
        .success-message { background: #e8f5e9; border: 1px solid rgba(46,125,50,0.2); border-radius: 10px; padding: 10px; color: #2e7d32; font-size: 12px; font-weight: 500; margin-bottom: 10px; display: none; }

        /* Actions row */
        .btn-row { display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; margin-top: auto; }
        .btn { height: 40px; border-radius: 8px; font-size: 13px; font-weight: 700; display: flex; justify-content: center; align-items: center; cursor: pointer; text-decoration: none; transition: all 0.2s; border: none; }
        .btn-primary { background: #cf6679; color: white; }
        .btn-primary:hover { background: #b05161; }
        .btn-secondary { background: white; color: #3d2314; border: 1.5px solid #eaddd3; box-sizing: border-box; }
        .btn-secondary:hover { border-color: #c89d7c; background: #fdfaf7; }

        @media (max-width: 760px) {
            body { background: #fdfaf7; }
            .tablet-container { width: 100vw; height: 100vh; border-radius: 0; border: none; }
        }
    </style>
</head>
<body>
    <div class="tablet-container">
        <!-- Header -->
        <div class="queue-header">
            <h1 class="queue-title">Báo Lỗi Pha Chế</h1>
            <a href="barista_queue.html" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Quay lại
            </a>
        </div>

        <!-- Split Content Area -->
        <div class="content-layout">
            
            <!-- Left Column: Info -->
            <div class="column column-left">
                <div>
                    <div class="section-title">Đơn hàng lỗi</div>
                    
                    <!-- Target Order Info -->
                    <div class="order-card" style="margin-bottom: 0;">
                        <div class="order-title" id="orderTitleText">Báo lỗi đơn #012</div>
                        <div class="order-desc" id="orderDescText">1x Espresso (Không đường)</div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Form inputs -->
            <div class="column">
                <div>
                    <div class="section-title">Chi tiết lỗi</div>

                    <div id="errorBox" class="error-message"></div>
                    <div id="successBox" class="success-message"></div>

                    <form id="issueForm" onsubmit="handleSubmit(event)">
                        <!-- Reason Dropdown -->
                        <div class="form-group">
                            <label class="form-label" for="issueReason">Lý do lỗi *</label>
                            <select id="issueReason" class="form-select" required>
                                <option value="" disabled selected>Chọn lý do...</option>
                                <option value="out_of_milk">Hết sữa hạt (Out of Milk)</option>
                                <option value="out_of_beans">Hết hạt cà phê</option>
                                <option value="printer_failure">Máy in kẹt giấy/lỗi kết nối</option>
                                <option value="quality_concern">Món nước pha hỏng/lỗi vị</option>
                                <option value="cup_shortage">Hết ly giấy 12oz</option>
                            </select>
                        </div>

                        <!-- Notes explanation -->
                        <div class="form-group">
                            <label class="form-label" for="issueNotes">Giải trình chi tiết *</label>
                            <textarea id="issueNotes" class="form-input" placeholder="Nhập mô tả sự cố ngắn gọn..." required></textarea>
                        </div>
                    </form>
                </div>

                <!-- Footer Buttons -->
                <div class="btn-row">
                    <a href="barista_queue.html" class="btn btn-secondary">HỦY BỎ</a>
                    <button type="submit" form="issueForm" class="btn btn-primary">XÁC NHẬN LỖI</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        let orderId = "012";
        let orderItem = "1x Espresso (Không đường)";

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            orderId = urlParams.get('id') || "012";
            
            if (orderId === '013') {
                orderItem = "1x Cà phê sữa đá (Sữa yến mạch)";
            } else if (orderId === '014') {
                orderItem = "2x Espresso (100% đường)";
            }
            
            document.getElementById('orderTitleText').textContent = `Báo lỗi đơn hàng #0${orderId}`;
            document.getElementById('orderDescText').textContent = orderItem;
        });

        function handleSubmit(e) {
            e.preventDefault();
            const reason = document.getElementById('issueReason').value;
            const notes = document.getElementById('issueNotes').value.trim();
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');

            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            if (reason === "" || notes === "") {
                errorBox.textContent = "Vui lòng nhập đầy đủ nguyên nhân và giải trình.";
                errorBox.style.display = 'block';
                return;
            }

            // Success simulation
            successBox.innerHTML = `✅ Đã báo cáo! Đơn #0${orderId} đang ở trạng thái <strong>TẠM DỪNG (HOLD)</strong>.`;
            successBox.style.display = 'block';

            // Disable form inputs
            document.getElementById('issueReason').disabled = true;
            document.getElementById('issueNotes').disabled = true;
            document.querySelector('.btn-primary').disabled = true;

            setTimeout(() => {
                window.location.href = "barista_queue.html";
            }, 2000);
        }
    </script>
</body>
</html>
