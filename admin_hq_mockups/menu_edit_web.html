<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Menu Item - HQ Portal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #fcfaf7; color: #2c1a11; margin: 0; padding: 0; }
        .wrapper { display: flex; min-height: 100vh; flex-direction: row; }
        .sidebar { width: 240px; background: #3d2314; color: white; padding: 25px 15px; box-sizing: border-box; }
        .sidebar h2 { font-size: 20px; margin-bottom: 30px; text-align: center; color: #c89d7c; }
        .sidebar a { display: block; color: #d1c4b9; padding: 12px 15px; text-decoration: none; border-radius: 8px; font-weight: 600; margin-bottom: 5px; }
        .sidebar a.active, .sidebar a:hover { background: #5c3826; color: white; }
        .main-content { flex: 1; padding: 30px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; border-bottom: 1px solid #eaddd3; padding-bottom: 15px; }
        .header h1 { font-size: 24px; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 12px; border: 1px solid #eaddd3; max-width: 600px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #5c3826; }
        input, select, textarea { width: 100%; height: 42px; padding: 10px; border: 1px solid #e5dbcf; border-radius: 8px; box-sizing: border-box; font-size: 15px; font-family: inherit; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #c89d7c; }
        textarea { height: auto; }
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn { padding: 12px 24px; background: #3d2314; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #5c3826; }
        .btn-secondary { background: transparent; color: #8c766c; border: 1px solid #e5dbcf; }
        .btn-secondary:hover { background: #fdfaf7; color: #3d2314; }
        
        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            .sidebar { width: 100%; padding: 15px; }
            .sidebar h2 { margin-bottom: 15px; }
            .sidebar-menu { display: flex; flex-wrap: wrap; gap: 5px; }
            .sidebar a { padding: 8px 12px; font-size: 14px; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="sidebar">
            <h2>EspressoHQ Admin</h2>
                                                <div class="sidebar-menu">
                <a href="dashboard_web.html">Trang chủ</a>
                <a href="users_web.html">Nhân sự</a>
                <a href="menu_web.html" class="active">Thực đơn</a>
                <a href="vouchers_web.html">Vouchers</a>
                <a href="customers.html">Khách hàng</a>
                <a href="reports_web.html">Báo cáo</a>
                <a href="settings_web.html">Cấu hình</a>
            </div>
        </div>
        <div class="main-content">
            <div class="header">
                <h1>Chỉnh Sửa Món Ăn</h1>
            </div>

            <div class="form-container">
                <div class="form-group">
                    <label>Tên món</label>
                    <input type="text" id="menu-name" value="Espresso">
                </div>
                <div class="form-group">
                    <label>Danh mục</label>
                    <select id="menu-cat">
                        <option value="1" selected>Cà Phê</option>
                        <option value="2">Trà</option>
                        <option value="3">Bánh ngọt</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Giá bán (VND)</label>
                    <input type="number" id="menu-price" value="35000">
                </div>
                <div class="form-group">
                    <label>Mã vạch (SKU/Barcode)</label>
                    <input type="text" id="menu-sku" value="CFE-ESP-01">
                </div>
                <div class="form-group">
                    <label>Mô tả món ăn</label>
                    <textarea id="menu-desc" rows="3">Cà phê Espresso chiết xuất máy nguyên chất vị đậm đà thơm nồng.</textarea>
                </div>
                <div class="form-group">
                    <label>Topping đi kèm được phép sử dụng</label>
                    <div id="topping-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #faf8f5; padding: 12px; border-radius: 8px; border: 1px solid #eaddd3; margin-bottom: 10px;">
                        <label style="font-weight: 500; font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #2c1a11; text-transform: none; margin: 0;">
                            <input type="checkbox" style="width: auto; height: auto;" value="1"> Trân châu trắng (+10,000 VND)
                        </label>
                        <label style="font-weight: 500; font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #2c1a11; text-transform: none; margin: 0;">
                            <input type="checkbox" style="width: auto; height: auto;" value="2"> Thạch đào (+10,000 VND)
                        </label>
                        <label style="font-weight: 500; font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #2c1a11; text-transform: none; margin: 0;">
                            <input type="checkbox" style="width: auto; height: auto;" value="3" checked> Sữa yến mạch (+10,000 VND)
                        </label>
                        <label style="font-weight: 500; font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #2c1a11; text-transform: none; margin: 0;">
                            <input type="checkbox" style="width: auto; height: auto;" value="4" checked> Kem Macchiato (+12,000 VND)
                        </label>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="new-topping-name" placeholder="Tên topping mới..." style="flex: 2; height: 36px; font-size: 13px;">
                        <input type="number" id="new-topping-price" placeholder="Giá cộng thêm..." style="flex: 1.2; height: 36px; font-size: 13px;">
                        <button type="button" onclick="addNewTopping()" style="padding: 0 15px; background: #3d2314; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; height: 36px;">+ Thêm</button>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn" onclick="saveMenu()">LƯU THAY ĐỔI</button>
                    <button class="btn btn-secondary" onclick="location.href='menu_web.html'">HỦY BỎ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function addNewTopping() {
            const nameInput = document.getElementById('new-topping-name');
            const priceInput = document.getElementById('new-topping-price');
            const name = nameInput.value.trim();
            const price = priceInput.value.trim();
            
            if (name === "" || price === "") {
                alert("Vui lòng điền đầy đủ tên Topping và giá tiền cộng thêm.");
                return;
            }
            
            const list = document.getElementById('topping-list');
            const newLabel = document.createElement('label');
            newLabel.style.cssText = 'font-weight: 500; font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #2c1a11; text-transform: none; margin: 0;';
            
            const formattedPrice = parseInt(price).toLocaleString('en-US');
            newLabel.innerHTML = `<input type="checkbox" style="width: auto; height: auto;" checked> ${name} (+${formattedPrice} VND)`;
            list.appendChild(newLabel);
            
            nameInput.value = "";
            priceInput.value = "";
        }

        function saveMenu() {
            alert("Cập nhật món ăn thành công!");
            window.location.href = "menu_web.html";
        }
    </script>
</body>
</html>
