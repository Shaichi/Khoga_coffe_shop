<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer - HQ Portal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #fcfaf7;
            color: #2c1a11;
            margin: 0;
            padding: 0;
        }

        .wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: #3d2314;
            color: white;
            padding: 25px 15px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .sidebar h2 {
            font-size: 20px;
            margin-bottom: 30px;
            text-align: center;
            color: #c89d7c;
        }

        .sidebar a {
            display: block;
            color: #d1c4b9;
            padding: 12px 15px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .sidebar a.active,
        .sidebar a:hover {
            background: #5c3826;
            color: white;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-bottom: 1px solid #eaddd3;
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
        }

        .breadcrumb {
            font-size: 13px;
            color: #8c766c;
            margin-bottom: 28px;
        }

        .breadcrumb a {
            color: #5c3826;
            text-decoration: none;
        }

        .card {
            background: white;
            padding: 28px;
            border-radius: 12px;
            border: 1px solid #eaddd3;
            max-width: 700px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #3d2314;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #e5dbcf;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #c89d7c;
            box-shadow: 0 0 0 3px rgba(200, 157, 124, 0.15);
        }

        .readonly-field {
            background: #f5ece1 !important;
            color: #8c766c;
            cursor: not-allowed;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .section-divider {
            font-size: 13px;
            font-weight: 700;
            color: #8c766c;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 28px 0 18px;
            border-top: 1px solid #f0e8df;
            padding-top: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-badge {
            background: #fff3e0;
            color: #e65100;
            border: 1px solid #ffb74d;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }

        .info-banner {
            background: #fdf4ea;
            border: 1px solid #f0d9bc;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .info-banner .info-item .lbl {
            font-size: 12px;
            color: #8c766c;
            text-transform: uppercase;
            font-weight: 600;
        }

        .info-banner .info-item .val {
            font-size: 16px;
            font-weight: 700;
            color: #3d2314;
            margin-top: 2px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }

        .badge-gold {
            background: #fffde7;
            color: #f57f17;
            border: 1px solid #fbc02d;
        }

        .badge-silver {
            background: #eceff1;
            color: #455a64;
            border: 1px solid #b0bec5;
        }

        .badge-bronze {
            background: #fff3e0;
            color: #e65100;
            border: 1px solid #ffb74d;
        }

        .badge-diamond {
            background: #ede7f6;
            color: #4527a0;
            border: 1px solid #9575cd;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn {
            padding: 11px 22px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-primary {
            background: #3d2314;
            color: white;
        }

        .btn-primary:hover {
            background: #5c3826;
        }

        .btn-secondary {
            background: transparent;
            color: #3d2314;
            border: 1px solid #e5dbcf;
        }

        .btn-secondary:hover {
            background: #fdfaf7;
        }

        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .admin-only-section {
            transition: opacity 0.2s;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="sidebar">
            <h2>Khoga Café Admin</h2>
                                                <div class="sidebar-menu">
                <a href="dashboard_web.html">Trang chủ</a>
                <a href="users_web.html">Nhân sự</a>
                <a href="menu_web.html">Thực đơn</a>
                <a href="vouchers_web.html">Vouchers</a>
                <a href="customers.html" class="active">Khách hàng</a>
                <a href="reports_web.html">Báo cáo</a>
                <a href="settings_web.html">Cấu hình</a>
            </div>
        </div>
        <div class="main-content">
            <div class="header">
                <h1>Chỉnh Sửa Thông Tin Khách Hàng</h1>
            </div>
            <div class="breadcrumb">
                <a href="customers.html">Khách hàng</a> › Trần Thị Lan › Chỉnh sửa
            </div>

            <div class="card">

                <div class="info-banner">
                    <div class="info-item">
                        <div class="lbl">Điểm tích lũy</div>
                        <div class="val">320 điểm</div>
                    </div>
                    <div class="info-item">
                        <div class="lbl">Ngày đăng ký</div>
                        <div class="val">15/03/2025</div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Họ và Tên</label>
                        <input type="text" class="readonly-field" value="Trần Thị Lan" readonly
                            title="Không thể chỉnh sửa">
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" class="readonly-field" value="0912345678" readonly
                            title="Không thể chỉnh sửa">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email liên hệ <span style="font-weight:400; color:#8c766c;">(tùy chọn)</span></label>
                    <input type="email" id="contactEmail" value="lan.tran@example.com" placeholder="example@email.com">
                </div>

                <!-- Points adjustment section — Admin only -->
                <div class="section-divider">
                    Điều chỉnh điểm thành viên
                    <span class="admin-badge">CHỈ ADMIN</span>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Điểm tích lũy mới</label>
                        <input type="number" id="pointsInput" value="320" min="0">
                    </div>
                    <div class="form-group">
                        <label>Lý do điều chỉnh <span style="font-weight:400; color:#8c766c;">(bắt buộc nếu thay đổi)</span></label>
                        <input type="text" id="reasonInput" placeholder="Ví dụ: Xử lý tranh chấp, Hoàn điểm lỗi hệ thống...">
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="handleSave()">Lưu thay đổi</button>
                    <a href="customers.html" class="btn btn-secondary">Hủy</a>
                </div>
            </div>
        </div>
    </div>
</body>

<script>
    function handleSave() {
        const originalPoints = 320;
        const newPoints = parseInt(document.getElementById('pointsInput').value);
        const reason = document.getElementById('reasonInput').value.trim();
        if (newPoints !== originalPoints && reason === '') {
            alert('Lỗi: Bắt buộc nhập lý do khi điều chỉnh điểm (BR-49).');
            document.getElementById('reasonInput').focus();
            return;
        }
        alert('Đã lưu thông tin khách hàng thành công.');
        window.location.href = 'customers.html';
    }
</script>

</html>
