<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - HQ Portal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #fcfaf7; color: #2c1a11; margin: 0; padding: 0; }
        .wrapper { display: flex; min-height: 100vh; flex-direction: row; }
        .sidebar { width: 240px; background: #3d2314; color: white; padding: 25px 15px; box-sizing: border-box; }
        .sidebar h2 { font-size: 20px; margin-bottom: 30px; text-align: center; color: #c89d7c; }
        .sidebar a { display: block; color: #d1c4b9; padding: 12px 15px; text-decoration: none; border-radius: 8px; font-weight: 600; margin-bottom: 5px; }
        .sidebar a.active, .sidebar a:hover { background: #5c3826; color: white; }
        .main-content { flex: 1; padding: 30px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; border-bottom: 1px solid #eaddd3; padding-bottom: 15px; }
        .header h1 { font-size: 24px; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 12px; border: 1px solid #eaddd3; max-width: 600px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #5c3826; }
        input, select { width: 100%; height: 42px; padding: 10px; border: 1px solid #e5dbcf; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        input:focus, select:focus { outline: none; border-color: #c89d7c; }
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn { padding: 12px 24px; background: #3d2314; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #5c3826; }
        .btn-secondary { background: transparent; color: #8c766c; border: 1px solid #e5dbcf; }
        .btn-secondary:hover { background: #fdfaf7; color: #3d2314; }
        
        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            .sidebar { width: 100%; padding: 15px; }
            .sidebar h2 { margin-bottom: 15px; }
            .sidebar-menu { display: flex; flex-wrap: wrap; gap: 5px; }
            .sidebar a { padding: 8px 12px; font-size: 14px; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="sidebar">
            <h2>EspressoHQ Admin</h2>
                                    <div class="sidebar-menu">
                <a href="dashboard_web.html">Trang chủ</a>
                <a href="branches_web.html">Chi nhánh</a>
                <a href="users_web.html" class="active">Nhân sự</a>
                <a href="menu_web.html">Thực đơn</a>
                <a href="vouchers_web.html">Vouchers</a>
                <a href="customers.html">Khách hàng</a>
                <a href="reports_web.html">Báo cáo</a>
                <a href="settings_web.html">Cấu hình</a>
            </div>
        </div>
        <div class="main-content">
            <div class="header">
                <h1>Chỉnh Sửa Tài Khoản Nhân Viên</h1>
            </div>

            <div class="form-container">
                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" id="fullname" value="Nguyễn Văn Thu Ngân">
                </div>
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="username" value="cashier01" disabled style="background-color: #f7f7f7;">
                </div>
                <div class="form-group">
                    <label>Email liên hệ</label>
                    <input type="email" id="email" value="cashier01@espressomail.com">
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="tel" id="phone" value="0987654321">
                </div>
                <div class="form-group">
                    <label>Vai trò</label>
                    <select id="role" onchange="togglePinField()">
                        <option value="CASHIER" selected>CASHIER (Thu ngân)</option>
                        <option value="BARISTA">BARISTA (Pha chế)</option>
                        <option value="STORE_MANAGER">STORE_MANAGER (Quản lý cửa hàng)</option>
                        <option value="ADMIN">ADMIN (Quản trị HQ)</option>
                    </select>
                </div>
                <div class="form-group" id="pin-group" style="display: none;">
                    <label>Mã PIN xác thực (4 chữ số)</label>
                    <input type="password" id="override-pin" placeholder="Nhập 4 chữ số PIN mới (để trống nếu không đổi)" maxlength="4" pattern="[0-9]{4}">
                </div>
                <div class="form-group">
                    <label>Chi nhánh</label>
                    <select id="branch">
                        <option value="Nguyen Du" selected>Nguyen Du Branch</option>
                        <option value="Tran Hung Dao">Tran Hung Dao Branch</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Trạng thái hoạt động</label>
                    <select id="status">
                        <option value="ACTIVE" selected>Đang hoạt động</option>
                        <option value="INACTIVE">Khóa tài khoản</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button class="btn" onclick="saveUser()">LƯU THAY ĐỔI</button>
                    <button class="btn btn-secondary" onclick="location.href='users_web.html'">HỦY BỎ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePinField() {
            const role = document.getElementById('role').value;
            const pinGroup = document.getElementById('pin-group');
            if (role === 'STORE_MANAGER' || role === 'ADMIN') {
                pinGroup.style.display = 'block';
            } else {
                pinGroup.style.display = 'none';
                document.getElementById('override-pin').value = '';
            }
        }

        // Run on load to set correct initial state
        window.addEventListener('DOMContentLoaded', togglePinField);

        function saveUser() {
            const role = document.getElementById('role').value;
            if (role === 'STORE_MANAGER' || role === 'ADMIN') {
                const pin = document.getElementById('override-pin').value;
                if (pin.trim() !== "" && !/^\d{4}$/.test(pin)) {
                    alert("Mã PIN phải gồm đúng 4 chữ số.");
                    return;
                }
            }
            alert("Cập nhật tài khoản nhân viên thành công!");
            window.location.href = "users_web.html";
        }
    </script>
</body>
</html>
