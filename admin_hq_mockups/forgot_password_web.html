<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Admin Reset Password - EspressoHQ</title>
    <style>
        :root {
            --primary: #3d2314;
            --primary-hover: #5c3826;
            --accent: #c89d7c;
            --accent-light: #eaddd3;
            --bg: #fcfaf7;
            --text-dark: #2c1a11;
            --text-muted: #8c766c;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid #eaddd3;
            box-shadow: 0 10px 30px rgba(61, 35, 20, 0.05);
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 30px 0;
            color: var(--primary);
        }
        .logo span {
            color: var(--accent);
        }
        h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--primary);
        }
        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            height: 48px;
            padding: 12px;
            border: 1.5px solid #eaddd3;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            background: white;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
        }
        button {
            width: 100%;
            height: 48px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background: var(--primary-hover);
        }
        .links {
            margin-top: 20px;
        }
        .links a {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        .links a:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">Espressō<span>HQ</span></div>
            <h2>Khôi Phục Mật Khẩu</h2>
            <p>Nhập địa chỉ email quản trị đã đăng ký để nhận liên kết/mã OTP khôi phục tài khoản.</p>

            <div class="form-group">
                <label>Email khôi phục</label>
                <input type="email" id="email" placeholder="admin@coffeeshop.com" value="admin01@espressomail.com">
            </div>

            <button onclick="handleForgot()">GỬI MÃ OTP</button>

            <div class="links">
                <a href="login_web.html">Quay lại Đăng nhập</a>
            </div>
        </div>
    </div>

    <script>
        function handleForgot() {
            const email = document.getElementById('email').value;
            if (email.includes('@')) {
                alert("Mã OTP khôi phục đã được gửi vào hòm thư quản trị!");
                // Simulating routing to set password or login
                window.location.href = "login_web.html";
            } else {
                alert("Vui lòng điền đúng địa chỉ email.");
            }
        }
    </script>
</body>
</html>
